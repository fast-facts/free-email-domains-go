name: Build/Deploy on Push

on:
  push:
    branches:
      - master
  workflow_dispatch:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.base_ref }}
  cancel-in-progress: true

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - run: cd ./update && npm install && npx camoufox-js fetch
      - run: cd ./update && npm run update

      - uses: actions/setup-go@v6
        with:
          go-version: stable
      - run: go get

      - run: go build
